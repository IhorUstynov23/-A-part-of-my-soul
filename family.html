<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title> Наша семья ❤️</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="family.css">
  <link rel="stylesheet" href="navigation.css">

  <title>Family</title>
</head>

<body class="family animation">

  <section class="family-section">

    <div class="album">

      <div class="album-cover " id="cover">
        <button class="btn btn-album" id="openAlbum">
          Открыть альбом ❤️
        </button>
        <h1>
          Наша история ❤️
        </h1>
        <p>
          2015 — ...
        </p>
      </div>
      <div class="album-content">


        <div class="left-page">
          <h2 id="yearTitle">
            2015
          </h2>

          <div class="photo-grid" id="photoGrid">

          </div>
        </div>

        <div class="story">
          <h2 id="storyTitle">
          </h2>
          <p id="storyText">
          </p>
        </div>
        <div class="book-buttons">
          <button id="prevYear">
            ←
          </button>
          <button id="nextYear">
            →
          </button>

        </div>
      </div>
  </section>
  <div class="viewer" id="viewer">

    <span class="viewer-close" id="viewerClose">
      ×
    </span>


    <button class="viewer-btn left" id="prevPhoto">
      ←
    </button>


    <img id="viewerImage">


    <button class="viewer-btn right" id="nextPhoto">
      →
    </button>


    <div class="rotate-buttons">

      <button id="rotateLeft">
        ↺
      </button>


      <button id="rotateRight">
        ↻
      </button>

    </div>


  </div>
  <script src="family.js"></script>
  <script src="navigation.js"></script>

</body>

</html>
