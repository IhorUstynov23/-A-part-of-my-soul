<!DOCTYPE html>
<html lang="en">

<head>

  <link rel="stylesheet" href="style.css">
  <title>Part of My Soul</title>
</head>

<body>
  <input type="checkbox" id="toggle-open">

    <span class="star" style="--d:3.8s;--delay:.2s; width:1.5px;height:1.5px;top:40%; left:22%"></span>
    <span class="star" style="--d:2.9s;--delay:.6s; width:1px; height:1px; top:50%; left:60%"></span>

    <span class="particle" style="--d:7s;--delay:0s;   width:4px;height:60px;top:0;left:20%"></span>
    <span class="particle" style="--d:9s;--delay:2s;  width:4px;height:80px;top:0;left:55%"></span>

    <span class="particle" style="--d:10s;--delay:5s; width:4px;height:65px;top:0;left:70%"></span>
    <span class="particle" style="--d:7.5s;--delay:6s;width:4px;height:45px;top:0;left:90%"></span>

  <div id="screen-open">
    <div class="title-main">Для самой важной части моей жизни <span class="heart">❤️</span></div>
    <div class="subtitle-main">Здесь собраны моменты, которые я никогда не хочу забывать.</div>

      <span class="shimmer"></span>
      ✨ Открыть
    </label>
  </div>
  <div id="screen-message">
    <p class="msg-line">Иногда мне сложно подобрать правильные слова.</p>
    <div class="divider"></div>
    <p class="msg-line">Поэтому я решил показать их через воспоминания.</p>
    <div class="btn-wrap">
      <a href="pageTwo.html" class="btn" for="toggle-journey">
        <span class="shimmer"></span>
        <span class="heart-sm">❤️</span> Начать путешествие
      </a>
    </div>
  </div>

</html>
