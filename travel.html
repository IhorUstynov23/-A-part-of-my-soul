<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="style.css" rel="stylesheet">
  <title>Travel</title>
</head>

<body class="travel animation">
  <div class="travel-location">
    <div class="stack">
      <input type="checkbox" id="zaporyzhie">
      <label for="zaporyzhie" class="stack-card">
        <div class="stack-preview">
          <img src="img/travel/ZP/zp-stack2.jpg">
          <img src="img/travel/ZP/zp-stack1.jpg">
          <img src="img/travel/ZP/zp-stack.jpg">
        </div>
        <p class="name-city">Запорожье</p>
      </label>
      <!-- overlay -->
      <div class="overlay">
        <div class="modal">
          <label for="zaporyzhie" class="close">✖</label>
          <h2 class="zaporizha">Запорожье</h2>
          <div class="gallery-scroll">
          </div>
        </div>
      </div>
    </div>
    <div class="stack">
      <input type="checkbox" id="kharkiv">
      <label for="kharkiv" class="stack-card">
        <div class="stack-preview">
          <img src="img/travel/KH/kh-stack1.jpg">
          <img src="img/travel/KH/kh-stack3.jpg">
          <img src="img/travel/KH/kh-stack.jpg">
        </div>
        <p class="name-city">Харьков</p>

      <!-- overlay -->

        <div class="modal">
          <label for="kharkiv" class="close">✖</label>
          <h2 class="zaporizha">Харьков</h2>

    </div>

          <img src="img/travel/DP/dp-stack2.jpg">
        </div>
        <p class="name-city">Днепр</p>
      </label>
      <!-- overlay -->
      <div class="overlay">
        <div class="modal">
